name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API build · test · audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Reproducible install — fails if the lockfile drifts from package.json.
      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @servora/api db:generate

      - name: Build
        run: pnpm --filter @servora/api build

      - name: Test
        run: pnpm --filter @servora/api test

      # Block known-vulnerable production packages (§A10). High/critical fail
      # the build. multer is force-patched via pnpm.overrides; the lodash
      # advisory (no upstream fix — 4.17.21 is latest) is documented in
      # pnpm.auditConfig.ignoreGhsas. Dev-only tooling vulns are out of scope.
      - name: Dependency audit (production)
        run: pnpm audit --prod --audit-level=high
